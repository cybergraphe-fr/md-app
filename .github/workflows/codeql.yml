name: CodeQL

'on':
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  schedule:
    - cron: '21 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f3f5a6d7f5f2363c7b1a6d25e6f7d3f876b1d7dd # v3.28.17
        with:
          languages: ${{ matrix.language }}

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: stable

      - name: Setup Node
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Autobuild
        uses: github/codeql-action/autobuild@f3f5a6d7f5f2363c7b1a6d25e6f7d3f876b1d7dd # v3.28.17

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f3f5a6d7f5f2363c7b1a6d25e6f7d3f876b1d7dd # v3.28.17
