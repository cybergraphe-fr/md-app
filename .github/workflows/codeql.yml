name: CodeQL

'on':
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  schedule:
    - cron: '21 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f3f5a6d7f5f2363c7b1a6d25e6f7d3f876b1d7dd # v3.28.17
        with:
          languages: ${{ matrix.language }}

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: Setup Node
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Autobuild
        uses: github/codeql-action/autobuild@f3f5a6d7f5f2363c7b1a6d25e6f7d3f876b1d7dd # v3.28.17

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f3f5a6d7f5f2363c7b1a6d25e6f7d3f876b1d7dd # v3.28.17
