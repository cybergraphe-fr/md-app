name: Desktop Signed Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Desktop version label
        required: true
        default: 0.1.0-dev
      sign_windows:
        description: Sign Windows binary when secrets are configured
        required: true
        type: boolean
        default: true
      notarize_macos:
        description: Notarize macOS app when secrets are configured
        required: true
        type: boolean
        default: true
      sync_api_base_url:
        description: Optional remote API base URL embedded for web-desktop sync (for example https://md.cybergraphe.fr)
        required: false
        default: ""

permissions:
  contents: read

jobs:
  windows:
    name: Windows x64 Build and Sign
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Build Windows desktop
        shell: pwsh
        env:
          MD_DESKTOP_REMOTE_API_URL: ${{ inputs.sync_api_base_url != '' && inputs.sync_api_base_url || vars.MD_DESKTOP_REMOTE_API_URL }}
        run: ./desktop/windows-x64/scripts/build-win-x64.ps1 -Version "${{ inputs.version }}"

      - name: Check Windows signing secrets
        if: ${{ inputs.sign_windows }}
        id: check_win_sign
        shell: pwsh
        env:
          HAS_CERT: ${{ secrets.MD_WIN_CERT_PFX_B64 != '' }}
          HAS_PASS: ${{ secrets.MD_WIN_CERT_PASSWORD != '' }}
        run: |
          if ("$env:HAS_CERT" -eq "true" -and "$env:HAS_PASS" -eq "true") {
            "can_sign=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "can_sign=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "::notice::Windows signing skipped. Set MD_WIN_CERT_PFX_B64 and MD_WIN_CERT_PASSWORD."
          }

      - name: Sign Windows executable
        if: ${{ inputs.sign_windows && steps.check_win_sign.outputs.can_sign == 'true' }}
        shell: pwsh
        env:
          MD_WIN_CERT_PFX_B64: ${{ secrets.MD_WIN_CERT_PFX_B64 }}
          MD_WIN_CERT_PASSWORD: ${{ secrets.MD_WIN_CERT_PASSWORD }}
        run: ./desktop/windows-x64/scripts/sign-win-x64.ps1 -InputExe "build\bin\MD.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-desktop-windows-x64
          path: |
            build/bin/MD.exe
            build/bin/web/**
          if-no-files-found: error

  macos:
    name: macOS Build and Notarize
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Build macOS desktop
        env:
          MD_DESKTOP_REMOTE_API_URL: ${{ inputs.sync_api_base_url != '' && inputs.sync_api_base_url || vars.MD_DESKTOP_REMOTE_API_URL }}
        run: bash desktop/macos/scripts/build-macos.sh "${{ inputs.version }}" "MD"

      - name: Check macOS notarization secrets
        if: ${{ inputs.notarize_macos }}
        id: check_macos_notarize
        env:
          HAS_SIGN: ${{ secrets.MD_MACOS_SIGN_IDENTITY != '' }}
          HAS_TEAM: ${{ secrets.MD_MACOS_TEAM_ID != '' }}
          HAS_PROFILE: ${{ secrets.MD_MACOS_NOTARY_KEYCHAIN_PROFILE != '' }}
          HAS_APPLE: ${{ secrets.MD_MACOS_NOTARY_APPLE_ID != '' }}
          HAS_APP_PASS: ${{ secrets.MD_MACOS_NOTARY_APP_PASSWORD != '' }}
        run: |
          if [[ "$HAS_SIGN" == "true" && "$HAS_TEAM" == "true" && ( "$HAS_PROFILE" == "true" || ( "$HAS_APPLE" == "true" && "$HAS_APP_PASS" == "true" ) ) ]]; then
            echo "can_notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_notarize=false" >> "$GITHUB_OUTPUT"
            echo "::notice::macOS notarization skipped. Configure MD_MACOS_SIGN_IDENTITY, MD_MACOS_TEAM_ID and notary credentials."
          fi

      - name: Notarize macOS app bundle
        if: ${{ inputs.notarize_macos && steps.check_macos_notarize.outputs.can_notarize == 'true' }}
        env:
          MD_MACOS_BUNDLE_ID: ${{ secrets.MD_MACOS_BUNDLE_ID }}
          MD_MACOS_TEAM_ID: ${{ secrets.MD_MACOS_TEAM_ID }}
          MD_MACOS_SIGN_IDENTITY: ${{ secrets.MD_MACOS_SIGN_IDENTITY }}
          MD_MACOS_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.MD_MACOS_NOTARY_KEYCHAIN_PROFILE }}
          MD_MACOS_NOTARY_APPLE_ID: ${{ secrets.MD_MACOS_NOTARY_APPLE_ID }}
          MD_MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MD_MACOS_NOTARY_APP_PASSWORD }}
        run: bash desktop/macos/notarization/notarize-macos.sh build/bin/MD.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-desktop-macos
          path: |
            build/bin/MD.app
            build/bin/MD-notarize.zip
          if-no-files-found: warn
